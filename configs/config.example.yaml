# Example configuration for CTF Agent
# Copy to configs/config.yaml and fill in your values

llm:
  # ── Primary: MiniMax (confirmed working) ──
  provider: minimax
  model: MiniMax-M2.7
  api_key: ${MINIMAX_API_KEY}
  base_url: https://api.minimax.chat/v1
  temperature: 0.1
  max_tokens: 4096

  # ── Fallback: MiMo (activate when your key works) ──
  fallback:
    provider: mimo
    model: mimo-v2.5-pro
    api_key: ${XIAOMI_API_KEY}
    base_url: https://token-plan-cn.xiaomimimo.com/v1

  # ── Alternative configs (comment/uncomment as needed) ──

  # MiMo Token Plan (China) — set XIAOMI_API_KEY env var
  # provider: mimo
  # model: mimo-v2.5-pro
  # api_key: ${XIAOMI_API_KEY}
  # base_url: https://token-plan-cn.xiaomimimo.com/v1

  # MiMo Token Plan (Singapore)
  # provider: mimo
  # model: mimo-v2.5-pro
  # api_key: ${XIAOMI_API_KEY}
  # base_url: https://token-plan-sgp.xiaomimimo.com/v1

  # MiMo Main Platform (sk-xxxxx key, not tp-xxxxx)
  # provider: mimo
  # model: mimo-v2.5-pro
  # api_key: ${XIAOMI_API_KEY}
  # base_url: https://api.xiaomimimo.com/v1

  # OpenAI
  # provider: openai
  # model: gpt-4o
  # api_key: ${OPENAI_API_KEY}

  # DeepSeek
  # provider: deepseek
  # model: deepseek-chat
  # api_key: ${DEEPSEEK_API_KEY}

  # Anthropic
  # provider: anthropic
  # model: claude-sonnet-4-20250514
  # api_key: ${ANTHROPIC_API_KEY}

  # Ollama (local)
  # provider: ollama
  # model: llama3
  # base_url: http://localhost:11434/v1

agent:
  max_iterations: 20      # Max planning iterations per solve attempt
  timeout: 600            # Global timeout in seconds
  retry_on_failure: true  # Retry if initial approach fails
  max_retries: 3          # Max retry attempts

sandbox:
  enabled: true           # Run exploits in Docker sandbox
  image: "ctf-agent:sandbox"
  memory_limit: "2g"
  network: "ctf-net"

tools:
  enabled:
    - nmap
    - curl
    - sqlmap
    - nikto
    - gdb
    - radare2
    - binwalk
    - strings
    - file
    - openssl
    - python3
    - gobuster
    - ffuf
    - john
    - hashcat
    - steghide
    - ropper
    - checksec

output:
  format: json            # json, yaml, or text
  directory: ./results
  verbose: true
