# Example configuration for CTF Agent
# Copy to configs/config.yaml and fill in your values

llm:
  # Supported providers: openai, openai-compatible, mimo, anthropic, deepseek, ollama, minimax, minimax-cn
  provider: mimo
  model: mimo-v2.5-pro
  # API key — set via environment variable or directly here
  # export XIAOMI_API_KEY=your-key-here
  api_key: ${XIAOMI_API_KEY}
  # MiMo main platform endpoint (NOT the token-plan endpoint)
  base_url: https://api.xiaomimimo.com/v1
  temperature: 0.1
  max_tokens: 4096

  # ── Fallback: when primary model fails (e.g. model not supported), auto-switch here ──
  fallback:
    provider: minimax
    model: MiniMax-Text-01
    # export MINIMAX_API_KEY=your-key-here
    api_key: ${MINIMAX_API_KEY}
    base_url: https://api.minimax.chat/v1
    # For China mainland, use:
    # provider: minimax-cn
    # base_url: https://api.minimaxi.com/v1

  # ── Alternative configs (comment/uncomment as needed) ──

  # OpenAI
  # provider: openai
  # model: gpt-4o
  # api_key: ${OPENAI_API_KEY}

  # DeepSeek
  # provider: deepseek
  # model: deepseek-chat
  # api_key: ${DEEPSEEK_API_KEY}

  # Anthropic
  # provider: anthropic
  # model: claude-sonnet-4-20250514
  # api_key: ${ANTHROPIC_API_KEY}

  # Ollama (local)
  # provider: ollama
  # model: llama3
  # base_url: http://localhost:11434/v1

agent:
  max_iterations: 20      # Max planning iterations per solve attempt
  timeout: 600            # Global timeout in seconds
  retry_on_failure: true  # Retry if initial approach fails
  max_retries: 3          # Max retry attempts

sandbox:
  enabled: true           # Run exploits in Docker sandbox
  image: "ctf-agent:sandbox"
  memory_limit: "2g"
  network: "ctf-net"

tools:
  enabled:
    - nmap
    - curl
    - sqlmap
    - nikto
    - gdb
    - radare2
    - binwalk
    - strings
    - file
    - openssl
    - python3
    - gobuster
    - ffuf
    - john
    - hashcat
    - steghide
    - ropper
    - checksec

output:
  format: json            # json, yaml, or text
  directory: ./results
  verbose: true
